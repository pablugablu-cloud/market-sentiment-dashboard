name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-app:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit health endpoint
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 15 \
            --max-time 180 \
            "https://masenti.streamlit.app/_stcore/health"

          echo
          echo "Streamlit app is healthy."
