name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 6 hours (UTC)
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-app:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging https://masenti.streamlit.app"
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 10 \
            --max-time 120 \
            --user-agent "GitHub-Actions-Keepalive" \
            "https://masenti.streamlit.app/?keepalive=$(date +%s)"
          echo
          echo "App responded successfully."
